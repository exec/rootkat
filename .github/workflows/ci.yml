name: ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    # GitHub Actions doesn't yet provide an ubuntu-26.04 runner label, so
    # amd64 entries use ubuntu-24.04 — both matrix entries do their
    # actual kernel work inside the Docker build container and the
    # QEMU VM, which DO use the matrix's ubuntu_version.
    # ARM64 entries use ubuntu-24.04-arm.
    runs-on: ${{ matrix.runner }}
    strategy:
      # Don't abort the whole matrix when one entry fails; we want to
      # see whether the failure is kernel-specific or universal.
      fail-fast: false
      matrix:
        include:
          - { ubuntu_version: "26.04", kernel: "7.0",  kernel_rust: "enabled",  runner: "ubuntu-24.04",     arch: "amd64" }
          - { ubuntu_version: "24.04", kernel: "6.x",  kernel_rust: "disabled", runner: "ubuntu-24.04",     arch: "amd64" }
          - { ubuntu_version: "24.04", kernel: "6.x",  kernel_rust: "disabled", runner: "ubuntu-24.04-arm", arch: "arm64" }
          - { ubuntu_version: "26.04", kernel: "7.0",  kernel_rust: "disabled", runner: "ubuntu-24.04-arm", arch: "arm64" }
    name: "Ubuntu ${{ matrix.ubuntu_version }} / kernel ${{ matrix.kernel }} (${{ matrix.arch }})"
    env:
      UBUNTU_VERSION: ${{ matrix.ubuntu_version }}
      KERNEL_RUST: ${{ matrix.kernel_rust }}
      ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4

      - name: Install host deps
        env:
          MATRIX_ARCH: ${{ matrix.arch }}
        run: |
          sudo apt-get update
          if [ "$MATRIX_ARCH" = "arm64" ]; then
            sudo apt-get install -y qemu-system-arm cloud-image-utils qemu-efi-aarch64
          else
            sudo apt-get install -y qemu-system-x86 cloud-image-utils
          fi

      - name: Enable KVM access for the runner user
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Build (Docker)
        run: ./scripts/build.sh

      - name: Fetch Ubuntu ${{ matrix.ubuntu_version }} cloud image
        run: ./scripts/fetch_test_image.sh

      - name: Test - load/unload baseline
        run: ./tests/qemu/run.sh tests/qemu/test_load_unload.sh

      - name: Test - self-hide
        run: ./tests/qemu/run.sh tests/qemu/test_self_hide.sh

      - name: Test - file-hide via eBPF
        run: ./tests/qemu/run.sh tests/qemu/test_file_hide.sh

      - name: Test - magic-signal privesc
        run: ./tests/qemu/run.sh tests/qemu/test_privesc.sh

      - name: Test - process hiding
        run: ./tests/qemu/run.sh tests/qemu/test_process_hide.sh

      - name: Test - network port hiding
        run: ./tests/qemu/run.sh tests/qemu/test_network_hide.sh

      - name: Test - persistence (auto-load on reboot)
        run: ./tests/qemu/run.sh tests/qemu/test_persistence.sh

      - name: Test - Rust LKM
        run: ./tests/qemu/run.sh tests/qemu/test_rust_module.sh

      - name: Test - BPF program self-hide
        run: ./tests/qemu/run.sh tests/qemu/test_bpf_hide.sh

      - name: Test - AF_UNIX socket path hiding
        run: ./tests/qemu/run.sh tests/qemu/test_unix_hide.sh

      - name: Test - io_uring covert-channel control surface
        run: ./tests/qemu/run.sh tests/qemu/test_io_uring_covert.sh

      - name: Test - netfilter covert-channel control surface
        run: ./tests/qemu/run.sh tests/qemu/test_netfilter_covert.sh

      - name: Test - dmesg / printk self-hide
        run: ./tests/qemu/run.sh tests/qemu/test_dmesg_hide.sh
