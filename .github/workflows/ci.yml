name: ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    # ubuntu-26.04 isn't a valid GH Actions label yet (Apr 2026 release,
    # runners lag). 24.04 has KVM, BTF, modern qemu, and BuildKit — the
    # kernel-7.0 testing all happens inside the Docker container and the
    # QEMU VM, so the runner OS doesn't have to be 26.04.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install host deps
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 cloud-image-utils

      - name: Enable KVM access for the runner user
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Build (Docker)
        run: ./scripts/build.sh

      - name: Fetch Ubuntu 26.04 cloud image
        run: ./scripts/fetch_test_image.sh

      - name: Test - load/unload baseline
        run: ./tests/qemu/run.sh tests/qemu/test_load_unload.sh

      - name: Test - self-hide
        run: ./tests/qemu/run.sh tests/qemu/test_self_hide.sh

      - name: Test - file-hide via eBPF
        run: ./tests/qemu/run.sh tests/qemu/test_file_hide.sh

      - name: Test - magic-signal privesc
        run: ./tests/qemu/run.sh tests/qemu/test_privesc.sh

      - name: Test - process hiding
        run: ./tests/qemu/run.sh tests/qemu/test_process_hide.sh

      - name: Test - network port hiding
        run: ./tests/qemu/run.sh tests/qemu/test_network_hide.sh

      - name: Test - persistence (auto-load on reboot)
        run: ./tests/qemu/run.sh tests/qemu/test_persistence.sh

      - name: Test - Rust LKM (kernel 7.0 stable Rust)
        run: ./tests/qemu/run.sh tests/qemu/test_rust_module.sh

      - name: Test - BPF program self-hide
        run: ./tests/qemu/run.sh tests/qemu/test_bpf_hide.sh
