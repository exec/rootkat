name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-ko-ubuntu:
    name: Build .ko (Ubuntu ${{ matrix.ubuntu_version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu release → kernel series shipped by linux-headers-generic.
          # Add a new row here when Ubuntu ships a new release with a new kernel series.
          # 24.10 (6.11) is intentionally omitted — it reached EOL July 2025.
          # 25.04 (6.14) is intentionally omitted — it reached EOL January 2026; its
          #   6.14.0-37 kernel also does not export const_current_task /
          #   validate_usercopy_range, causing modpost failures. Use Fedora 42 for 6.14.x.
          - { ubuntu_version: "24.04", kernel_rust: "disabled" }   # 6.8.x
          - { ubuntu_version: "25.10", kernel_rust: "disabled" }   # 6.17.x
          - { ubuntu_version: "26.04", kernel_rust: "enabled"  }   # 7.0.x

    steps:
      - uses: actions/checkout@v4

      - name: Build rootkat.ko (lkm only)
        env:
          UBUNTU_VERSION: ${{ matrix.ubuntu_version }}
          KERNEL_RUST: ${{ matrix.kernel_rust }}
          BUILD_IMAGE_FORCE: "1"
          ROOTKAT_COMPONENTS: "lkm"
        run: ./scripts/build.sh

      - name: Determine kernel version from vermagic
        id: kver
        run: |
          KVER=$(strings lkm/rootkat.ko | grep 'vermagic=' | awk -F= '{print $2}' | awk '{print $1}')
          if [ -z "$KVER" ]; then
            echo "ERROR: could not read vermagic from lkm/rootkat.ko" >&2
            exit 1
          fi
          ASSET="rootkat-ko-${KVER}-x86_64.tar.gz"
          echo "kver=$KVER"   >> "$GITHUB_OUTPUT"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
          echo "Built for kernel: $KVER"

      - name: Package
        run: |
          ASSET="${{ steps.kver.outputs.asset }}"
          tar -czf "$ASSET" -C lkm rootkat.ko

      - uses: actions/upload-artifact@v4
        with:
          name: rootkat-ko-${{ steps.kver.outputs.kver }}
          path: ${{ steps.kver.outputs.asset }}

  build-ko-fedora:
    name: Build .ko (Fedora ${{ matrix.fedora_version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # Fedora 42 ships 6.14.x — Ubuntu's 6.14 kernel is EOL and modpost-broken,
          # but Fedora's exports the required symbols cleanly.
          - { fedora_version: "42" }

    steps:
      - uses: actions/checkout@v4

      - name: Build rootkat.ko (lkm only, Fedora)
        env:
          DISTRO: fedora
          FEDORA_VERSION: ${{ matrix.fedora_version }}
          BUILD_IMAGE_FORCE: "1"
          ROOTKAT_COMPONENTS: "lkm"
        run: ./scripts/build.sh

      - name: Determine kernel version from vermagic
        id: kver
        run: |
          KVER=$(strings lkm/rootkat.ko | grep 'vermagic=' | awk -F= '{print $2}' | awk '{print $1}')
          if [ -z "$KVER" ]; then
            echo "ERROR: could not read vermagic from lkm/rootkat.ko" >&2
            exit 1
          fi
          ASSET="rootkat-ko-${KVER}-x86_64.tar.gz"
          echo "kver=$KVER"   >> "$GITHUB_OUTPUT"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
          echo "Built for kernel: $KVER"

      - name: Package
        run: |
          ASSET="${{ steps.kver.outputs.asset }}"
          tar -czf "$ASSET" -C lkm rootkat.ko

      - uses: actions/upload-artifact@v4
        with:
          name: rootkat-ko-${{ steps.kver.outputs.kver }}
          path: ${{ steps.kver.outputs.asset }}

  build-ko-ubuntu-arm64:
    name: Build .ko (Ubuntu ${{ matrix.ubuntu_version }} / arm64)
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - { ubuntu_version: "24.04" }   # 6.8.x
          - { ubuntu_version: "25.10" }   # 6.17.x
          - { ubuntu_version: "26.04" }   # 7.0.x

    steps:
      - uses: actions/checkout@v4

      - name: Build rootkat.ko (lkm only)
        env:
          UBUNTU_VERSION: ${{ matrix.ubuntu_version }}
          ARCH: arm64
          BUILD_IMAGE_FORCE: "1"
          ROOTKAT_COMPONENTS: "lkm"
        run: ./scripts/build.sh

      - name: Determine kernel version from vermagic
        id: kver
        run: |
          KVER=$(strings lkm/rootkat.ko | grep 'vermagic=' | awk -F= '{print $2}' | awk '{print $1}')
          if [ -z "$KVER" ]; then
            echo "ERROR: could not read vermagic from lkm/rootkat.ko" >&2
            exit 1
          fi
          ASSET="rootkat-ko-${KVER}-aarch64.tar.gz"
          echo "kver=$KVER"   >> "$GITHUB_OUTPUT"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
          echo "Built for kernel: $KVER"

      - name: Package
        run: |
          ASSET="${{ steps.kver.outputs.asset }}"
          tar -czf "$ASSET" -C lkm rootkat.ko

      - uses: actions/upload-artifact@v4
        with:
          name: rootkat-ko-${{ steps.kver.outputs.kver }}-arm64
          path: ${{ steps.kver.outputs.asset }}

  release:
    name: Publish release
    needs: [build-ko-ubuntu, build-ko-fedora, build-ko-ubuntu-arm64]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List assets
        run: ls -lh artifacts/

      - uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.tar.gz
          body: |
            ## Pre-built kernel modules

            Drop the matching `.tar.gz` into your alcapwn cache:

            ```sh
            KVER=$(uname -r)
            ARCH=$(uname -m)
            mkdir -p ~/.alcapwn/rootkat/$KVER
            curl -fsSL "https://github.com/exec/rootkat/releases/latest/download/rootkat-ko-${KVER}-${ARCH}.tar.gz" \
              | tar -xz -C ~/.alcapwn/rootkat/$KVER rootkat.ko
            ```

            Or let alcapwn fetch it automatically: `persist <id> rootkat` downloads
            and caches the right `.ko` for the target kernel if one is available.

            | Asset | Kernel series | Distro |
            |-------|--------------|--------|
            | `rootkat-ko-6.8.*-generic-x86_64.tar.gz`       | 6.8.x  | Ubuntu 24.04 LTS     |
            | `rootkat-ko-6.14.*.fc42.x86_64-x86_64.tar.gz`  | 6.14.x | Fedora 42            |
            | `rootkat-ko-6.17.*-generic-x86_64.tar.gz`      | 6.17.x | Ubuntu 25.10         |
            | `rootkat-ko-7.0.*-generic-x86_64.tar.gz`       | 7.0.x  | Ubuntu 26.04 LTS     |

            ARM64 builds (drop-in replacement, same cache path logic):
            | `rootkat-ko-6.8.*-generic-aarch64.tar.gz`      | 6.8.x  | Ubuntu 24.04 LTS / arm64 |
            | `rootkat-ko-6.17.*-generic-aarch64.tar.gz`     | 6.17.x | Ubuntu 25.10 / arm64     |
            | `rootkat-ko-7.0.*-generic-aarch64.tar.gz`      | 7.0.x  | Ubuntu 26.04 LTS / arm64 |

            For other kernel versions, see the [build instructions](https://github.com/exec/rootkat#building).
